body:
  text: 天上玉女記天上玉女記魏濟北郡從事掾弦超字義起以嘉平中夜獨宿夢有神女來從之自稱天上玉女東郡人姓成公字知瓊早失父母天帝哀其孤苦遣令下嫁從夫超當其夢也精爽感悟嘉其美異非常人之容覺寤欽想若存若亡如此三四夕一旦顯然來遊駕輜軿車從八婢服綾羅綺繡之衣姿顏容體狀若飛仙自言年七十視之如十五六女車上有壺榼青白琉璃五具飲諂奇異饌具醴酒與超共飲食謂超曰我天上玉女見遣下嫁故來從君不謂君德宿時感運宜為夫婦不能有益亦不能為損然往來當可得駕輕車乘肥馬飲食常可得遠味異饍繒素當可得充用不乏然我神人不為君生子亦無妬忌之性不害君婚姻之義遂為夫婦贈詩一篇其文曰飄颻浮勃逢敖曹雲石滋芝英不須潤至德與時期神仙豈虛感應運來相之納我榮五族逆我致禍菑此其詩之大較其文二百餘言不能悉錄兼註易七卷有卦有象以彖為屬故其文言既有義理又可以占吉凶猶揚子之太玄薛氏之中經也超皆能通其旨意用之占候作夫婦經七八年父母為超娶婦之後分日而燕分夕而寢夜來晨去倏忽若飛唯超見之他人不見雖居閒室輒聞人聲常見蹤跡然不覩其形後人怪問漏泄其事玉女遂求去云我神人也雖與君交不願人知而君性疏漏我今本末已露不復與君通接積年交結恩義不輕一旦分別豈不愴恨勢不得不爾各自努力又呼侍御下酒飲啗發簏取織成裙衫兩副遺超又贈詩一首把臂告辭涕泣流離肅然昇車去若飛迅超憂感積日殆至委頓去後五年超奉郡使至洛到濟北魚山下陌上西行遙望曲道頭有一車馬似知瓊驅馳至前果是也遂披帷相見悲喜交切控左授綏同乘至洛遂為室家剋復舊好至太康中猶在但不日日往來每於三月三日五月五日七月七日九月九日旦十五日輒下往來經宿而去張茂先為之作神女賦
